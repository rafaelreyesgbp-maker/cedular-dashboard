name: Actualizar dashboard Impuesto Cedular

on:
  schedule:
    - cron: '0 14-22 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests xlrd

      - name: Ejecutar script de actualizacion
        env:
          DRIVE_API_KEY: ${{ secrets.DRIVE_API_KEY }}
        run: python update_index.py

      - name: Commit y push de index.html
        uses: EndBug/add-and-commit@v9
        with:
          add: 'index.html'
          message: 'Actualizacion automatica de proyeccion - Impuesto Cedular'
          default_author: github_actions
